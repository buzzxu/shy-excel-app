# xwjd-export-client CI（cnb.cool）—— 打 tag 出正式 Release（NSIS 安装包）
# ----------------------------------------------------------------------------
# 触发：推送 v* 版本 tag（如 v0.1.0）。日常 master push 不打包，避免浪费算力。
#   → 解决「推送后跳过打包 / commit 附件难找且 30 天过期」：产物改发到仓库 Releases 页（永久、好找）。
#
# 目标用户为后台 Windows 端 → 在 cnb 的 Linux 容器中用 cargo-xwin **交叉编译 Windows x64**，
# 并由 tauri-cli 打 **NSIS 安装包**（.exe 安装程序，Linux 可跨平台打包，不同于 WiX/MSI）。
# 安装包默认 webviewInstallMode=downloadBootstrapper，安装时自动检测并安装 WebView2 运行时。
# 前端为静态 ui/（tauri generate_context 编译期内嵌，无需 node 构建）。
#
# 发布：git:release 内置步骤创建该 tag 的 Release，再用 cnb OpenAPI 三步式把安装包传为
#       **Release 资产**（呈现在 Releases 页）。注意：cnbcool/attachments 只挂到 commit，
#       不会出现在 Release 页（实测 assets=0），故改用 OpenAPI release asset 接口。
#
# ✅ 编译链路已在 cnb 实测跑通（commit 033d8bb 产出 setup.exe ~3.6MB）；本文件把
#    「触发器 + 末段产物落点」从 master-push/commit 附件 改为 tag/Release，编译阶段原样保留。
# 关键依赖（实测得出，缺一不可）：
#   1) llvm —— 交叉编译 ring(rustls/ureq) 与 zstd-sys(arrow) 的 C 代码需 llvm-lib/llvm-rc/lld-link；
#   2) clang-cl —— Debian 不带该名，从 clang 显式建链（clang 的 MSVC 模式）；
#   3) libayatana-appindicator3-dev + pkg-config —— tauri tray-icon 特性打包时宿主侧检测必需；
#   4) curl + jq —— 末段调 cnb OpenAPI 上传 Release 资产用。
# macOS 端需 macOS runner（容器不支持），不在此 pipeline。
#
# 用法：git tag v0.1.0 && git push origin v0.1.0  → cnb 自动构建并发布到 Releases 页。
# ----------------------------------------------------------------------------

"v*":
  tag_push:
    - name: build-nsis-and-release
      runner:
        cpus: 8
      docker:
        image: rust:1-bookworm
        volumes:
          - /usr/local/cargo/registry:copy-on-write
          - /root/.cache/cargo-xwin:copy-on-write
          - /root/.cache/tauri:copy-on-write
          - target:copy-on-write
      env:
        XWIN_CACHE_DIR: /root/.cache/cargo-xwin
      stages:
        - name: 安装工具链（llvm + cargo-xwin + tauri-cli + nsis）
          script: |
            set -e
            apt-get update -qq
            # llvm 提供 llvm-lib/llvm-rc/llvm-dlltool（cc-rs 交叉编译 C 依赖必需）；lld 提供 lld-link
            # libayatana-appindicator3-dev + pkg-config：tauri-cli 的 tray-icon 特性在打包时会做宿主侧
            #   appindicator 检测（即便目标是 Windows），缺则 panic "Can't detect any appindicator library"
            apt-get install -y -qq --no-install-recommends \
              clang llvm lld nsis zip ca-certificates pkg-config libayatana-appindicator3-dev curl jq
            # 把 /usr/lib/llvm-*/bin 的 unversioned 工具链到 /usr/local/bin（在 PATH，跨 stage 持久）
            LLVMBIN=$(ls -d /usr/lib/llvm-*/bin 2>/dev/null | sort -V | tail -1)
            echo "LLVMBIN=$LLVMBIN"
            # clang-cl = clang 的 MSVC 模式（同一二进制按 argv0 切换）；Debian 不带该名，从 clang 显式建链
            ln -sf "$(command -v clang)" /usr/local/bin/clang-cl
            for t in llvm-lib llvm-rc llvm-dlltool llvm-ar lld-link; do
              if [ -e "$LLVMBIN/$t" ]; then ln -sf "$LLVMBIN/$t" /usr/local/bin/$t; else echo "缺 $t"; fi
            done
            command -v clang-cl llvm-lib llvm-rc lld-link
            rustup target add x86_64-pc-windows-msvc
            command -v cargo-xwin >/dev/null 2>&1 || cargo install --locked cargo-xwin
            command -v cargo-tauri >/dev/null 2>&1 || cargo install --locked tauri-cli --version "^2"
            rustc --version && cargo-xwin --version && cargo tauri --version

        - name: 交叉编译并打 NSIS 安装包
          script: |
            set -e
            export PATH="$(ls -d /usr/lib/llvm-*/bin | sort -V | tail -1):$PATH"
            # ureq→rustls→ring(C) 与 arrow ipc_compression→zstd-sys(C) 均由 cargo-xwin + llvm 工具交叉编译
            cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --bundles nsis
            echo "== NSIS 产物 ==" && (ls -lh target/x86_64-pc-windows-msvc/release/bundle/nsis/ 2>/dev/null || \
              ls -lh src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/)

        - name: 收集安装包
          script: |
            set -e
            SETUP=$(find . -path "*/release/bundle/nsis/*-setup.exe" | head -1)
            if [ -z "$SETUP" ]; then echo "❌ 未找到 NSIS 安装包"; find . -name "*-setup.exe"; exit 1; fi
            mkdir -p out
            # 稳定资产名（版本由 Release 的 tag 体现），便于固定下载链接
            cp "$SETUP" "out/xwjd-export-client-setup-x64.exe"
            ls -lh out/

        - name: 创建 Release
          type: git:release
          options:
            title: xwjd-export-client ${CNB_BRANCH}
            latest: true

        - name: 上传安装包为 Release 资产（cnb OpenAPI 三步式）
          script: |
            # 注意：cnb 的 script 由 sh(dash) 执行，不能用 bash 专有的 `set -o pipefail`
            set -e
            FN=xwjd-export-client-setup-x64.exe
            API=https://api.cnb.cool
            SIZE=$(wc -c < "out/$FN" | tr -d ' ')
            AUTH="Authorization: Bearer $CNB_TOKEN"
            # 上一 stage 的 git:release 已为本 tag 创建 Release，取其 id
            RID=$(curl -fsS -H "$AUTH" -H "Accept: application/json" \
              "$API/$CNB_REPO_SLUG/-/releases/tags/$CNB_BRANCH" | jq -r '.id')
            [ -n "$RID" ] && [ "$RID" != "null" ] || { echo "❌ 取 release_id 失败"; exit 1; }
            echo "release_id=$RID size=$SIZE"
            # 1) 申请上传地址（必须 Accept: application/vnd.cnb.api+json，否则 406）
            RESP=$(curl -fsS -X POST -H "$AUTH" \
              -H "Content-Type: application/json" -H "Accept: application/vnd.cnb.api+json" \
              "$API/$CNB_REPO_SLUG/-/releases/$RID/asset-upload-url" \
              -d "{\"asset_name\":\"$FN\",\"size\":$SIZE,\"overwrite\":true}")
            UPURL=$(echo "$RESP" | jq -r '.upload_url')
            VERIFY=$(echo "$RESP" | jq -r '.verify_url')
            # 2) PUT 文件到对象存储
            curl -fsS -X PUT -H "Content-Type: application/octet-stream" \
              --data-binary "@out/$FN" "$UPURL" >/dev/null
            # 3) 确认：必须 --path-as-is 保留 verify_url 里编码的 %2F 资产路径段，否则 token 校验失败
            curl -fsS --path-as-is -X POST -H "$AUTH" \
              -H "Accept: application/vnd.cnb.api+json" "$VERIFY" >/dev/null
            # 校验资产已挂到 Release
            echo "== Release 资产 ==" && curl -fsS -H "$AUTH" -H "Accept: application/json" \
              "$API/$CNB_REPO_SLUG/-/releases/$RID" | jq -r '.assets[] | "  · \(.name) \(.size) bytes  \(.browser_download_url)"'
