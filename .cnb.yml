# xwjd-export-client CI（cnb.cool）—— 编译 + NSIS 安装包 + 上传 cnb 附件
# ----------------------------------------------------------------------------
# 目标用户为后台 Windows 端 → 在 cnb 的 Linux 容器中用 cargo-xwin **交叉编译 Windows x64**，
# 并由 tauri-cli 打 **NSIS 安装包**（.exe 安装程序）。NSIS 可在 Linux 跨平台打包（不同于 WiX/MSI）。
# 安装包默认 webviewInstallMode=downloadBootstrapper，安装时自动检测并安装 WebView2 运行时。
# 前端为静态 ui/（tauri generate_context 编译期内嵌，无需 node 构建）。
# 产物：NSIS 安装程序 *-setup.exe，经 cnbcool/attachments 上传为本次 commit 的 cnb 附件。
#
# 触发：master push 且改动构建相关文件（ifModify）。发版到 release 附件可另加 `$: tag_push:`。
#
# ⚠ 首次需在 cnb 上验证/调试：cargo-xwin 下载 Win SDK、zstd-sys(C) 交叉编译、tauri-cli 下载
#   NSIS 工具/插件、资源图标嵌入等在本机无法验证。macOS 端需 macOS runner（容器不支持），不在此 pipeline。
# ----------------------------------------------------------------------------

master:
  push:
    - name: build-nsis-and-upload
      runner:
        cpus: 8
      docker:
        image: rust:1-bookworm
        volumes:
          - /usr/local/cargo/registry:copy-on-write
          - /root/.cache/cargo-xwin:copy-on-write
          - /root/.cache/tauri:copy-on-write
          - target:copy-on-write
      ifModify:
        - "src-tauri/**"
        - "crates/**"
        - "ui/**"
        - "Cargo.toml"
        - "Cargo.lock"
        - ".cnb.yml"
      env:
        XWIN_CACHE_DIR: /root/.cache/cargo-xwin
      stages:
        - name: 安装工具链（cargo-xwin + tauri-cli + nsis）
          script: |
            set -e
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends clang lld nsis zip ca-certificates
            rustup target add x86_64-pc-windows-msvc
            command -v cargo-xwin >/dev/null 2>&1 || cargo install --locked cargo-xwin
            command -v cargo-tauri >/dev/null 2>&1 || cargo install --locked tauri-cli --version "^2"
            rustc --version && cargo-xwin --version && cargo tauri --version

        - name: 交叉编译并打 NSIS 安装包
          script: |
            set -e
            # ureq 默认 rustls（无需 openssl 交叉编译）；arrow ipc_compression 的 zstd-sys(C) 由 cargo-xwin 编译
            cargo tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --bundles nsis
            echo "== NSIS 产物 ==" && ls -lh src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/ || \
              ls -lh target/x86_64-pc-windows-msvc/release/bundle/nsis/

        - name: 收集安装包
          script: |
            set -e
            SETUP=$(find . -path "*/release/bundle/nsis/*-setup.exe" | head -1)
            if [ -z "$SETUP" ]; then echo "❌ 未找到 NSIS 安装包"; find . -name "*-setup.exe"; exit 1; fi
            mkdir -p out
            cp "$SETUP" "out/xwjd-export-client-setup-x64.exe"
            ls -lh out/

        - name: 上传到 cnb 附件
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./out/xwjd-export-client-setup-x64.exe"
            commit: ${CNB_COMMIT}
            ttl: 30
