<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShyExcel</title>
  <style>
    /* ============================================================
       ShyExcel · Liquid Glass 主题（翡翠液态玻璃，呼应应用图标）
       —— 半透明磨砂面板浮于流动翡翠光场之上；玻璃徽章；带流光的进度条。
       类名/ID 与 main.js 保持一致，仅换装。
       ============================================================ */
    :root {
      /* 翡翠玻璃主色（取自图标渐变） */
      --em: #10b981;          /* 翡翠主色 */
      --em-deep: #0a8f63;     /* 深翡翠（hover/文字强调） */
      --aqua: #5fe9c2;        /* 高光青 */
      --brand: var(--em);

      --bg-base: #eaf2ee;     /* 微带翠意的浅底 */
      --surface: rgba(255,255,255,0.60);       /* 磨砂卡面 */
      --surface-strong: rgba(255,255,255,0.80);/* 较实玻璃（头部/弹窗/按钮） */
      --glass-edge: rgba(255,255,255,0.75);    /* 玻璃上沿内高光 */

      --text: #102019;
      --text-2: #566b62;
      --text-3: #8a988f;
      --hairline: rgba(8,42,30,0.10);
      --hairline-strong: rgba(8,42,30,0.15);
      --fill: rgba(16,185,129,0.07);
      --fill-hover: rgba(16,185,129,0.13);
      --track: rgba(8,42,30,0.12);

      --run: #0ea5a4;         /* 进行中：青 */
      --done: #10b981;        /* 完成：翡翠（= 品牌，成功即品牌色） */
      --red: #f0594c;

      --shadow: 0 1px 1px rgba(6,40,30,.05), 0 12px 32px rgba(6,40,30,.10);
      --shadow-pop: 0 24px 70px rgba(3,28,20,.30);
      --glow: 0 0 0 1px rgba(16,185,129,.0);
      --radius: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --em: #2dd4a7; --em-deep: #19c79a; --aqua: #7df7d6; --brand: var(--em);
        --bg-base: #0b1714;
        --surface: rgba(30,46,41,0.55);
        --surface-strong: rgba(34,52,46,0.74);
        --glass-edge: rgba(255,255,255,0.12);
        --text: #e9f4ef;
        --text-2: #9eb3aa;
        --text-3: #6f857c;
        --hairline: rgba(255,255,255,0.10);
        --hairline-strong: rgba(255,255,255,0.17);
        --fill: rgba(255,255,255,0.06);
        --fill-hover: rgba(255,255,255,0.11);
        --track: rgba(255,255,255,0.12);
        --run: #2ad4cf; --done: #2dd4a7; --red: #ff6a5e;
        --shadow: 0 1px 1px rgba(0,0,0,.3), 0 14px 38px rgba(0,0,0,.45);
        --shadow-pop: 0 28px 80px rgba(0,0,0,.62);
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text", "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 13.5px;
      line-height: 1.45;
      /* 流动翡翠光场（液态玻璃的底） */
      background:
        radial-gradient(880px 520px at 10% -8%, rgba(95,233,194,.42), transparent 60%),
        radial-gradient(720px 520px at 104% 2%, rgba(16,185,129,.24), transparent 55%),
        radial-gradient(820px 640px at 50% 118%, rgba(13,170,140,.16), transparent 60%),
        var(--bg-base);
      background-attachment: fixed;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(880px 520px at 10% -8%, rgba(45,212,167,.20), transparent 60%),
          radial-gradient(720px 520px at 104% 2%, rgba(16,150,120,.18), transparent 55%),
          radial-gradient(820px 640px at 50% 118%, rgba(10,120,95,.18), transparent 62%),
          var(--bg-base);
        background-attachment: fixed;
      }
    }
    /* 缓慢漂移的氛围光斑（液态感，极轻） */
    body::before {
      content: ""; position: fixed; inset: -25%; z-index: -1; pointer-events: none;
      background:
        radial-gradient(420px 320px at 30% 30%, rgba(95,233,194,.20), transparent 60%),
        radial-gradient(380px 300px at 72% 60%, rgba(16,185,129,.16), transparent 60%);
      filter: blur(8px);
      animation: drift 30s ease-in-out infinite alternate;
    }
    @keyframes drift { from { transform: translate3d(-3%,-2%,0) scale(1); } to { transform: translate3d(4%,3%,0) scale(1.08); } }

    /* 翡翠细滚动条（Windows 默认滚动条较粗，统一两端观感；WebView2 + WKWebView 均支持） */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--em) 32%, transparent);
      border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: color-mix(in srgb, var(--em) 50%, transparent); background-clip: padding-box; }

    /* ---------- header ---------- */
    header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 11px;
      padding: 13px 18px;
      background: var(--surface-strong);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-bottom: 1px solid var(--hairline);
      box-shadow: inset 0 1px 0 var(--glass-edge);
    }
    .logo { width: 26px; height: 26px; display: grid; place-items: center; flex: 0 0 auto;
      filter: drop-shadow(0 3px 6px rgba(8,120,90,.30)); }
    .logo svg { width: 26px; height: 26px; display: block; }
    .title { font-weight: 650; font-size: 15px; letter-spacing: .2px; }
    .subtitle { font-size: 12px; color: var(--text-3); align-self: center; margin-left: -4px;
      padding-left: 9px; border-left: 1px solid var(--hairline); }
    .spacer { flex: 1; }
    .btn {
      appearance: none; border: 1px solid var(--hairline-strong);
      background: var(--surface-strong);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: var(--text); padding: 6px 12px; border-radius: 10px; font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .15s, transform .06s, border-color .15s, box-shadow .15s;
      font-family: inherit;
      box-shadow: inset 0 1px 0 var(--glass-edge);
    }
    .btn:hover { background: var(--fill-hover); border-color: var(--hairline-strong); }
    .btn:active { transform: scale(.97); }
    .btn.icon { padding: 6px 9px; }
    .btn.ghost { border-color: transparent; background: transparent; color: var(--text-2); box-shadow: none; backdrop-filter: none; }
    .btn.ghost:hover { background: var(--fill); color: var(--em-deep); }
    .btn.primary {
      border-color: transparent; color: #fff; font-weight: 600;
      background: linear-gradient(155deg, var(--aqua), var(--em) 55%, var(--em-deep));
      box-shadow: 0 6px 18px color-mix(in srgb, var(--em) 45%, transparent),
                  inset 0 1px 0 rgba(255,255,255,.45);
      text-shadow: 0 1px 1px rgba(4,60,42,.25);
    }
    .btn.primary:hover { filter: brightness(1.05) saturate(1.05); }
    .btn:disabled { opacity: .4; cursor: default; }
    svg.i { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* ---------- main ---------- */
    main { padding: 18px 16px 30px; max-width: 760px; margin: 0 auto; }
    .tasks { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--surface);
      backdrop-filter: saturate(160%) blur(20px); -webkit-backdrop-filter: saturate(160%) blur(20px);
      border: 1px solid var(--hairline); border-radius: var(--radius);
      padding: 15px 16px;
      box-shadow: var(--shadow), inset 0 1px 0 var(--glass-edge);
      animation: pop .3s cubic-bezier(.22,.61,.36,1);
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .card:hover { transform: translateY(-1px); box-shadow: var(--shadow), 0 18px 44px rgba(6,40,30,.14), inset 0 1px 0 var(--glass-edge); }
    @keyframes pop { from { opacity: 0; transform: translateY(7px) scale(.99); } to { opacity: 1; transform: none; } }
    .card .top { display: flex; align-items: center; gap: 10px; }
    .card .name { font-weight: 600; font-size: 14px; margin-right: auto; }
    .card .name::before { content: ""; display: inline-block; width: 8px; height: 8px; border-radius: 3px;
      background: linear-gradient(150deg, var(--aqua), var(--em)); margin-right: 9px; vertical-align: middle;
      box-shadow: 0 0 6px color-mix(in srgb, var(--em) 55%, transparent); }
    .card .sub { color: var(--text-3); font-size: 12px; font-variant-numeric: tabular-nums; }
    .card .del { margin-left: auto; opacity: 0; transition: opacity .15s; }
    .card:hover .del { opacity: 1; }

    .badge { font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px;
      box-shadow: inset 0 0 0 1px color-mix(in srgb, currentColor 22%, transparent); }
    .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge.run { color: var(--run); background: color-mix(in srgb, var(--run) 15%, transparent); }
    .badge.run::before { animation: pulse 1s ease-in-out infinite; }
    .badge.done { color: var(--done); background: color-mix(in srgb, var(--done) 16%, transparent); }
    .badge.err { color: var(--red); background: color-mix(in srgb, var(--red) 15%, transparent); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* progress —— 流光进度条（signature） */
    .prog { margin-top: 13px; }
    .bar { height: 8px; border-radius: 999px; background: var(--track); overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(4,30,22,.12); }
    .bar > i { display: block; height: 100%; border-radius: 999px; position: relative; overflow: hidden;
      background: linear-gradient(90deg, var(--em), var(--aqua));
      box-shadow: 0 0 10px color-mix(in srgb, var(--em) 55%, transparent);
      width: 0%; transition: width .3s ease; }
    .bar > i::after { content: ""; position: absolute; inset: 0;
      background: linear-gradient(100deg, transparent 28%, rgba(255,255,255,.65) 50%, transparent 72%);
      transform: translateX(-100%); animation: sheen 1.7s linear infinite; }
    @keyframes sheen { to { transform: translateX(100%); } }
    .bar.indet > i { width: 38% !important; animation: indet 1.1s ease-in-out infinite; }
    @keyframes indet { 0% { transform: translateX(-110%);} 100% { transform: translateX(320%);} }
    .meta { display: flex; justify-content: space-between; gap: 10px; margin-top: 9px; color: var(--text-2); font-size: 12px; font-variant-numeric: tabular-nums; }

    /* done stats */
    .stats { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; }
    .stat .v { font-weight: 650; font-size: 15px; font-variant-numeric: tabular-nums; }
    .stat .k { color: var(--text-3); font-size: 11px; margin-top: 1px; }
    .path {
      margin-top: 13px; display: flex; align-items: center; gap: 9px; padding: 10px 12px;
      background: var(--fill); border: 1px solid var(--hairline); border-radius: 11px; cursor: pointer;
      transition: background .15s, border-color .15s; min-width: 0;
    }
    .path:hover { background: var(--fill-hover); border-color: color-mix(in srgb, var(--em) 28%, transparent); }
    .path .ic { color: var(--em-deep); flex: 0 0 auto; }
    .path .p { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12.5px; color: var(--text); font-variant-numeric: tabular-nums; }
    .path .go { color: var(--em-deep); font-weight: 650; font-size: 12.5px; flex: 0 0 auto; }
    .errbox { margin-top: 12px; padding: 10px 12px; border-radius: 11px; font-size: 12.5px;
      color: var(--red); background: color-mix(in srgb, var(--red) 10%, transparent); border: 1px solid color-mix(in srgb, var(--red) 24%, transparent); word-break: break-word; }

    /* empty */
    .empty { text-align: center; padding: 70px 20px; color: var(--text-3); }
    .empty .big { width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 20px;
      background: linear-gradient(155deg, var(--aqua), var(--em) 60%, var(--em-deep));
      display: grid; place-items: center; color: #fff;
      box-shadow: 0 12px 30px color-mix(in srgb, var(--em) 40%, transparent), inset 0 1px 0 rgba(255,255,255,.5); }
    .empty h3 { color: var(--text-2); font-weight: 600; font-size: 15px; margin: 0 0 5px; }
    .empty p { margin: 0; font-size: 13px; }

    /* ---------- settings sheet ---------- */
    .overlay { position: fixed; inset: 0; background: rgba(4,22,16,.32); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 50; animation: fade .2s; }
    .overlay.show { display: flex; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .sheet { width: 460px; max-width: calc(100vw - 32px);
      background: var(--surface-strong);
      backdrop-filter: saturate(180%) blur(30px); -webkit-backdrop-filter: saturate(180%) blur(30px);
      border: 1px solid var(--hairline); border-radius: 20px;
      box-shadow: var(--shadow-pop), inset 0 1px 0 var(--glass-edge);
      padding: 22px; animation: rise .26s cubic-bezier(.22,.61,.36,1); }
    @keyframes rise { from { opacity: 0; transform: translateY(10px) scale(.98);} to { opacity:1; transform: none; } }
    .sheet h2 { margin: 0 0 18px; font-size: 16px; font-weight: 650; }
    .field { margin-bottom: 18px; }
    .field > label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 7px; font-weight: 500; }
    .dirrow { display: flex; gap: 8px; }
    input[type=text], input[type=number] {
      flex: 1; min-width: 0; padding: 9px 12px; border: 1px solid var(--hairline-strong); border-radius: 10px;
      background: var(--fill); color: var(--text); font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    input:focus { border-color: var(--em); box-shadow: 0 0 0 3px color-mix(in srgb, var(--em) 22%, transparent); background: var(--surface-strong); }
    input[readonly] { color: var(--text-2); }
    .hint { font-size: 11.5px; color: var(--text-3); margin-top: 6px; }
    .sheet .actions { display: flex; justify-content: flex-end; margin-top: 4px; }

    /* 可达性：减少动态 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lgo" x1="3" y1="3" x2="29" y2="29" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6CF6D2"/><stop offset="1" stop-color="#0E9E6B"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="28" height="28" rx="9" fill="url(#lgo)"/>
        <rect x="2.7" y="2.7" width="26.6" height="26.6" rx="8.3" stroke="#fff" stroke-opacity=".55"/>
        <rect x="8.5" y="8" width="15" height="16" rx="3" fill="#fff" fill-opacity=".96"/>
        <path d="M8.5 13h15" stroke="#13B98A" stroke-opacity=".55" stroke-width="1.4"/>
        <path d="M16 8v16M8.5 18.5h15" stroke="#13B98A" stroke-opacity=".3" stroke-width="1.1"/>
      </svg>
    </span>
    <div class="title">ShyExcel</div>
    <div class="subtitle">数据导出</div>
    <div class="spacer"></div>
    <button class="btn ghost" id="clearDone" title="清理已完成/失败的任务">
      <svg class="i" viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/></svg>
      清理
    </button>
    <button class="btn icon" id="openSettings" title="设置">
      <svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 0 1-4 0v-.2A1.7 1.7 0 0 0 7 19.4a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 2.6 14H2.4a2 2 0 0 1 0-4h.2a1.7 1.7 0 0 0 1.2-2.9 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 10 2.6V2.4a2 2 0 0 1 4 0v.2a1.7 1.7 0 0 0 2.9 1.2 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V10a1.7 1.7 0 0 0 1.6 1.2h.2"/></svg>
    </button>
  </header>

  <main>
    <div class="tasks" id="tasks"></div>
    <div class="empty" id="empty">
      <div class="big"><svg class="i" style="width:28px;height:28px;stroke:#fff" viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg></div>
      <h3>暂无导出任务</h3>
      <p>从业务系统点击「导出」，任务会出现在这里并实时显示进度。</p>
    </div>
  </main>

  <!-- 设置 -->
  <div class="overlay" id="settings">
    <div class="sheet">
      <h2>设置</h2>
      <div class="field">
        <label>下载目录</label>
        <div class="dirrow">
          <input id="dir" type="text" readonly placeholder="选择导出文件保存的位置" />
          <button class="btn" id="pick">更改…</button>
        </div>
        <div class="hint" id="dirhint">导出的文件将保存到此目录；多文件会按任务编号建子目录。</div>
      </div>
      <div class="field">
        <label>每文件单数</label>
        <input id="chunk" type="number" min="1000" step="10000" value="70000" />
        <div class="hint" id="memhint"></div>
      </div>
      <div class="actions">
        <button class="btn primary" id="closeSettings">完成</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
